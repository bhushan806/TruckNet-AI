services:
  - type: web
    name: trucknet-frontend
    runtime: node
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://trucknet-ai.onrender.com/api
      - key: NEXT_PUBLIC_AI_ENGINE_URL
        value: https://trucknet-ai-engine.onrender.com
