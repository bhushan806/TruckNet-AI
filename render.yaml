services:
  # Main API Service
  - type: web
    name: trucknet-api
    rootDir: apps/backend/api
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        fromService:
          name: trucknet-frontend
          type: web
          property: url
      - key: AI_ENGINE_URL
        fromService:
          name: trucknet-ai-engine
          type: web
          property: url

  # AI Node Engine (separate service)
  - type: web
    name: trucknet-ai-engine
    rootDir: apps/backend/ai-node-engine
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGIN
        fromService:
          name: trucknet-frontend
          type: web
          property: url

  # Frontend Service (Next.js)
  - type: web
    name: trucknet-frontend
    rootDir: apps/web
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: trucknet-api
          type: web
          property: url
      - key: NEXT_PUBLIC_AI_ENGINE_URL
        fromService:
          name: trucknet-ai-engine
          type: web
          property: url
